# Approach summary

methodology_summary: |
  Three-layer ranker. (1) JD understanding is encoded once, by hand, as a
  structured rubric (jd_rubric.py): must-have capability keyword families,
  a soft 5-9y experience band, and explicit disqualifier patterns (pure
  research, services-only career, CV/speech/robotics without NLP, LangChain-
  wrapper-only AI experience, title-chasing, non-coding senior titles,
  no-visa-sponsorship locations). (2) Per-candidate features (features.py)
  extract capability hits, a proficiency x duration-weighted skill-quality
  score, a keyword-stuffing detector (AI skill names with zero corroborating
  career-narrative evidence), an honeypot detector (impossible experience
  claims), and a behavioral availability score from the redrob_signals
  (recency, response rate, interview completion, profile completeness).
  (3) Contextual relevance comes from TF-IDF cosine similarity between each
  candidate's career narrative (not their skills list) and the JD's
  core-intent text -- chosen over a pretrained embedding model specifically
  to stay deterministic, dependency-light, and comfortably inside the
  CPU/no-network/5-minute budget for 100K candidates (~60-90s measured).
  Final score = weighted blend of semantic + capability + skill-quality +
  experience + location fit, multiplied by disqualifier penalties and a
  behavioral-availability multiplier. Reasoning strings are templated
  directly from the same feature dict used for scoring, so every claim is
  traceable to a real profile field.


